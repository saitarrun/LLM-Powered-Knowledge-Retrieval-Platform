services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    dns:
      - 8.8.8.8
      - 1.1.1.1
    ports:
      - "8001:8000"
    volumes:
      - ./backend:/app
      - ./data:/app/data
    environment:
      - ENVIRONMENT=development
      - LOG_LEVEL=debug
      - DATABASE_URL=sqlite:///./data/rag.db
      - FAISS_INDEX_PATH=./data/faiss_index
      - EMBEDDING_MODEL=all-MiniLM-L6-v2
      - OPENAI_API_KEY=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
      - REDIS_URL=redis://redis:6379/0
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
    depends_on:
      - redis
      - neo4j

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/app
      - ./data:/app/data
    environment:
      - ENVIRONMENT=development
      - LOG_LEVEL=debug
      - DATABASE_URL=sqlite:///./data/rag.db
      - FAISS_INDEX_PATH=./data/faiss_index
      - EMBEDDING_MODEL=all-MiniLM-L6-v2
      - OPENAI_API_KEY=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
      - REDIS_URL=redis://redis:6379/0
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
    command: celery -A app.core.celery_app worker --loglevel=info
    restart: unless-stopped
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

  neo4j:
    image: neo4j:5.18.0
    environment:
      - NEO4J_AUTH=neo4j/password
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - ./data/neo4j:/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8001/api
      - BACKEND_URL=http://backend:8000
    command: npm run dev
    depends_on:
      - backend
    restart: unless-stopped

  n8n:
    image: n8nio/n8n:latest
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=UTC
      - N8N_MCP_ENABLED=true
    volumes:
      - ./data/n8n:/home/node/.n8n
    depends_on:
      - backend
