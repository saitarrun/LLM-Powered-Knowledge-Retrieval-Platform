name: Claude Post-Deploy Smoke Tests

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  smoke-test:
    name: Post-Deploy Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install httpx

      - name: Create .env from .env.example and set CI values
        run: |
          cp .env.example .env
          # Override for CI environment
          {
            echo "ENVIRONMENT=ci"
            echo "LOG_LEVEL=info"
            echo "OPENAI_API_KEY=sk-test-smoke-test-placeholder"
            echo "NEO4J_PASSWORD=testpass"
          } >> .env
          mkdir -p data
          echo "✅ .env created for CI"
          head -5 .env

      - name: Verify docker-compose syntax
        run: |
          docker compose config > /dev/null
          echo "✅ docker-compose.yml is valid"

      - name: Build and start all services
        run: |
          echo "🚀 Starting Docker Compose stack..."
          docker compose up -d --build
          sleep 5
          docker compose ps

      - name: Wait for backend health check
        timeout-minutes: 3
        run: |
          echo "⏳ Waiting for backend..."
          for i in {1..30}; do
            if curl -sf http://localhost:8001/api/health > /dev/null 2>&1; then
              echo "✅ Backend is healthy"
              exit 0
            fi
            echo "  [$i/30] Waiting... ($(($i * 2))s elapsed)"
            sleep 2
          done
          echo "❌ Backend did not become healthy"
          docker compose logs backend --tail=50
          exit 1

      - name: Wait for frontend
        timeout-minutes: 2
        run: |
          echo "⏳ Waiting for frontend..."
          for i in {1..20}; do
            if curl -sf http://localhost:3001 > /dev/null 2>&1; then
              echo "✅ Frontend is healthy"
              exit 0
            fi
            echo "  [$i/20] Waiting..."
            sleep 2
          done
          echo "⚠️  Frontend not ready yet, but continuing with backend tests"

      - name: Run Claude-powered smoke tests
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GITHUB_TOKEN:       ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY:  ${{ github.repository }}
          GITHUB_SHA:         ${{ github.sha }}
          COMMIT_MESSAGE:     ${{ github.event.head_commit.message || 'CI deployment test' }}
          RUN_URL:            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python .github/scripts/smoke_test.py

      - name: Show Docker Compose status
        if: always()
        run: |
          echo "=== SERVICE STATUS ===" && docker compose ps
          echo "" && echo "=== RECENT LOGS ===" 
          docker compose logs --tail=30 2>&1 | head -100

      - name: Cleanup
        if: always()
        run: docker compose down -v 2>/dev/null || true
